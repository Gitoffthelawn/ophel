name: "⭐ Star History Tracker"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 获取当前 star 数量
        id: stars
        run: echo "count=$(gh api repos/${{ github.repository }} --jq '.stargazers_count')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 生成 star 图表
        run: node scripts/generate-star-chart.mjs
        env:
          STAR_COUNT: ${{ steps.stars.outputs.count }}

      - name: 推送到 star-data 分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/stars.json /tmp/stars.json
          cp assets/stars.svg /tmp/stars.svg
          cp assets/stars-dark.svg /tmp/stars-dark.svg
          git branch -D star-data 2>/dev/null || true
          git checkout --orphan star-data
          git rm -rf --quiet . 2>/dev/null || true
          mkdir -p data assets
          cp /tmp/stars.json data/stars.json
          cp /tmp/stars.svg assets/stars.svg
          cp /tmp/stars-dark.svg assets/stars-dark.svg
          git add data/stars.json assets/stars.svg assets/stars-dark.svg
          git commit -m "chore: update star chart [skip ci]"
          git push --force origin star-data
